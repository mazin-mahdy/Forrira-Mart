<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forrira - Confirm Order</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .order-wrap { max-width:820px; margin:30px auto; background:white; padding:20px; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.06); }
    .timer { font-size:20px; font-weight:700; color:#c0392b; margin-top:12px; }
    .order-items { margin-top:12px; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>Forrira</h1>
        <h2>Confirm Order</h2>
      </div>
      <div class="header-right">
        <div id="welcomeSmall2" class="welcome-small"></div>
      </div>
    </div>
  </header>

  <div class="order-wrap">
    <div id="customerInfo"></div>

    <h3>Items</h3>
    <div id="itemsList" class="order-items"></div>

    <h3>Delivery</h3>
    <label><input type="radio" name="deliveryOpt" value="15" checked> Standard — 45 min (15 LE)</label><br>
    <label><input type="radio" name="deliveryOpt" value="30"> Fast — 30 min (30 LE)</label>

    <div class="timer" id="timerText" style="display:none;"></div>

    <div style="margin-top:18px;">
      <button id="placeBtn" class="btn-primary" onclick="placeOrderOnOrderPage()">Place Order</button>
      <button class="btn-secondary" onclick="window.location.href='shop.html'">Back to shop</button>
    </div>

    <p id="orderMsg" style="color:green;font-weight:700;margin-top:12px;"></p>
  </div>

  <div id="popupMsgOrder" class="popup-msg" style="display:none;"></div>

  <script src="script.js"></script>
</body>
</html>
